<section aria-labelledby="contact-heading">

<h2 id="contact-heading">

Get In Touch

</h2>

<p>

Feel free to contact me using the form below.

</p>

<form
      aria-label="Contact Form">

<label for="name">

Full Name

</label>

<input
type="text"
id="name"
name="name"
placeholder="Enter your name"
required
aria-required="true">

<br><br>

<label for="email">

Email Address

</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter your email"
required
aria-required="true">

<br><br>

<label for="subject">

Subject

</label>

<input
type="text"
id="subject"
name="subject"
placeholder="Enter subject"
required
aria-required="true">

<br><br>

<label for="message">

Message

</label>

<textarea
id="message"
name="message"
rows="6"
placeholder="Type your message"
required
aria-required="true">

</textarea>

<br><br>

<button type="submit">

Send Message

</button>

<button type="reset">

Reset

</button>

</form>

</section>
